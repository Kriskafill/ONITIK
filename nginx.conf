events {}

http {
    upstream backend_pool {
        server app1:4000;
        server app2:4000;
        server app3:4000;
    }

    server {
        listen 80;
        location / {
            proxy_pass       http://backend_pool;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}