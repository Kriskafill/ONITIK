<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Китайские династии</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #F5F5F0; }
    header { background: #8B1A1A; color: white; padding: 16px 32px; font-size: 22px; font-weight: bold; }
    .container { max-width: 1100px; margin: 32px auto; padding: 0 16px; }
    .flash { padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; }
    .flash.success { background: #d4edda; color: #155724; }
    .flash.danger  { background: #f8d7da; color: #721c24; }
    a.btn, button.btn { display: inline-block; padding: 7px 16px; border-radius: 4px;
      font-size: 14px; text-decoration: none; border: none; cursor: pointer; }
    .btn-primary   { background: #8B1A1A; color: white; }
    .btn-secondary { background: #555;    color: white; }
    .btn-danger    { background: #c0392b; color: white; }
    .btn-edit      { background: #1565C0; color: white; }
    table { width: 100%; border-collapse: collapse; background: white;
            border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    th { background: #8B1A1A; color: white; padding: 12px 14px; text-align: left; font-size: 14px; }
    td { padding: 11px 14px; font-size: 14px; border-bottom: 1px solid #eee; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .top-bar h2 { font-size: 18px; color: #8B1A1A; }
  </style>
</head>
<body>
  <header>🐉 Китайские династии и правители</header>
  <div class="container">
    {% for cat, msg in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
