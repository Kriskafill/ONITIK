{% extends "base.html" %}
{% block content %}
<div class="top-bar">
  <h2>{{ title }}</h2>
  <a href="{{ url_for('index') }}" class="btn btn-secondary">← Назад</a>
</div>
<div style="background:white; padding:28px; border-radius:6px; max-width:560px; margin-top:16px;">
  <form method="POST">
    {% for fname, label, ftype in [
      ("name","Название *","text"), ("ruler","Правитель *","text"),
      ("year_start","Год начала *","number"), ("year_end","Год конца *","number"),
      ("capital","Столица","text")] %}
    <div style="margin-bottom:14px;">
      <label style="display:block; font-size:13px; margin-bottom:4px;">{{ label }}</label>
      <input type="{{ ftype }}" name="{{ fname }}"
             value="{{ dynasty[fname] if dynasty else '' }}"
             {% if '*' in label %}required{% endif %}
             style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
    </div>
    {% endfor %}
    <div style="margin-bottom:18px;">
      <label style="display:block; font-size:13px; margin-bottom:4px;">Описание</label>
      <textarea name="description" rows="4"
        style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"
        >{{ dynasty.description if dynasty else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; padding:10px;">
      {{ 'Сохранить' if dynasty else 'Добавить' }}
    </button>
  </form>
</div>
{% endblock %}
